name: Run tests

on:
  - push
  - pull_request

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4.1.0
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm run test
